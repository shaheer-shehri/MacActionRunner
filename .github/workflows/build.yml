name: Build NFC Print Tool

# Builds the Windows .exe and macOS .app on native runners (PyInstaller can't
# cross-compile). Both macOS builds run on the reliable Apple-Silicon runner
# (macos-14): one native arm64, one x86_64 via Rosetta — because GitHub's Intel
# runners (macos-13) are scarce. The x86_64 build runs on ALL Macs (Intel native
# + Apple Silicon via Rosetta), so it is the universal-coverage artifact.
# Assumes app/ contents (run.py, NFCPrintTool.spec, requirements.txt, qrnfc/, ui/)
# are at the repo root.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PY_VER: "3.12"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: NFCPrintTool-windows
          - os: macos-14          # Apple Silicon runner, native build
            artifact: NFCPrintTool-macos-arm64
            macarch: arm64
          - os: macos-15          # macOS 15 (Apple Silicon) — x86_64 build via Rosetta.
            artifact: NFCPrintTool-macos-intel  # needs OS 15 so pip accepts the
            macarch: x86_64                      # macosx_15_0_x86_64 pikepdf wheel.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # --- Native build (Windows, and native arm64 macOS) ---
      - name: Set up Python (native)
        if: matrix.macarch != 'x86_64'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VER }}

      - name: Build (native)
        if: matrix.macarch != 'x86_64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
          python -m PyInstaller --noconfirm --clean NFCPrintTool.spec

      # --- Intel (x86_64) macOS build on the Apple-Silicon runner via Rosetta ---
      - name: Build (x86_64 via Rosetta)
        if: matrix.macarch == 'x86_64'
        run: |
          set -e
          softwareupdate --install-rosetta --agree-to-license || true
          PKG=python-3.12.8-macos11.pkg
          curl -fsSLo "$PKG" "https://www.python.org/ftp/python/3.12.8/$PKG"
          sudo installer -pkg "$PKG" -target /
          PY=/usr/local/bin/python3.12
          arch -x86_64 "$PY" -m pip install --upgrade pip
          arch -x86_64 "$PY" -m pip install -r requirements.txt pyinstaller
          arch -x86_64 "$PY" -m PyInstaller --noconfirm --clean NFCPrintTool.spec
          echo "Built arch:"; file dist/NFCPrintTool.app/Contents/MacOS/NFCPrintTool || true

      # --- macOS packaging (both mac jobs) ---
      - name: Package macOS (zip + best-effort dmg)
        if: runner.os == 'macOS'
        run: |
          set -e
          ditto -c -k --keepParent "dist/NFCPrintTool.app" "dist/NFCPrintTool-app.zip"
          ( for i in 1 2 3 4 5; do
              hdiutil create -volname "NFC Print Tool" \
                -srcfolder "dist/NFCPrintTool.app" -ov -format UDZO \
                "dist/NFCPrintTool.dmg" && exit 0
              echo "hdiutil busy, retry $i…"; sleep 12
            done; echo "dmg skipped after retries (non-fatal; use the zip)" ) || true

      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/NFCPrintTool.exe
            dist/NFCPrintTool-app.zip
            dist/NFCPrintTool.dmg
          if-no-files-found: ignore
