name: Build NFC Print Tool

# Builds the Windows .exe and macOS .app (Intel + Apple Silicon) on native
# runners, since PyInstaller cannot cross-compile. Artifacts appear under the
# run's "Artifacts" section. Assumes the app/ contents (run.py, NFCPrintTool.spec,
# requirements.txt, qrnfc/, ui/) are at the repo root.

on:
  push:
    branches: [main, master]
  workflow_dispatch:      # lets you run it manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: NFCPrintTool-windows
          - os: macos-13         # Intel (x86_64)
            artifact: NFCPrintTool-macos-intel
          - os: macos-14         # Apple Silicon (arm64)
            artifact: NFCPrintTool-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build
        run: python -m PyInstaller --noconfirm --clean NFCPrintTool.spec

      - name: Package macOS (zip + best-effort dmg)
        if: runner.os == 'macOS'
        run: |
          set -e
          # Reliable: zip that preserves the .app bundle (symlinks, exec bits)
          ditto -c -k --keepParent "dist/NFCPrintTool.app" "dist/NFCPrintTool-app.zip"
          # .dmg is best-effort — hdiutil can hit transient "Resource busy" on runners
          ( for i in 1 2 3 4 5; do
              hdiutil create -volname "NFC Print Tool" \
                -srcfolder "dist/NFCPrintTool.app" -ov -format UDZO \
                "dist/NFCPrintTool.dmg" && exit 0
              echo "hdiutil busy, retry $i…"; sleep 12
            done; echo "dmg step skipped after retries (non-fatal; use the zip)" ) || true

      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/NFCPrintTool.exe
            dist/NFCPrintTool-app.zip
            dist/NFCPrintTool.dmg
          if-no-files-found: ignore
