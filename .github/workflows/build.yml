name: Build NFC Print Tool

# Builds the Windows .exe and macOS .app (Intel + Apple Silicon) on native
# runners, since PyInstaller cannot cross-compile. Artifacts appear under the
# run's "Artifacts" section. Assumes the app/ contents (run.py, NFCPrintTool.spec,
# requirements.txt, qrnfc/, ui/) are at the repo root.

on:
  push:
    branches: [main, master]
  workflow_dispatch:      # lets you run it manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: NFCPrintTool-windows
          - os: macos-13         # Intel (x86_64)
            artifact: NFCPrintTool-macos-intel
          - os: macos-14         # Apple Silicon (arm64)
            artifact: NFCPrintTool-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build
        run: python -m PyInstaller --noconfirm --clean NFCPrintTool.spec

      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "NFC Print Tool" \
            -srcfolder "dist/NFCPrintTool.app" -ov -format UDZO \
            "dist/NFCPrintTool.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/NFCPrintTool.exe
            dist/NFCPrintTool.app
            dist/NFCPrintTool.dmg
          if-no-files-found: ignore
